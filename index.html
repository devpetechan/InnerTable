<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>InnerTable 🍽️</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #fdf8f2;
      --tan:      #f0e6d3;
      --rust:     #c0522a;
      --rust-dk:  #9a3e1e;
      --olive:    #6b7c4a;
      --slate:    #4a6b7c;
      --text:     #2c2416;
      --muted:    #8a7560;
      --white:    #ffffff;
      --shadow:   0 2px 12px rgba(44,36,22,.10);
      --radius:   14px;
    }

    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* ═══ WELCOME ═══ */
    #welcome-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      background: linear-gradient(160deg, #fdf8f2 0%, #f0e6d3 100%);
    }
    .welcome-card {
      background: var(--white); border-radius: 24px; padding: 48px 40px;
      max-width: 420px; width: 100%;
      box-shadow: 0 8px 40px rgba(44,36,22,.13); text-align: center;
    }
    .logo { font-size: 52px; margin-bottom: 12px; }
    .welcome-card h1 { font-size: 2rem; font-weight: 800; color: var(--rust); letter-spacing: -.5px; }
    .welcome-card p { color: var(--muted); margin: 10px 0 32px; font-size: 1rem; line-height: 1.5; }
    .input-group { display: flex; flex-direction: column; gap: 12px; }
    .input-group input {
      border: 2px solid var(--tan); border-radius: 12px; padding: 14px 16px;
      font-size: 1rem; color: var(--text); background: var(--cream); outline: none;
      transition: border-color .2s; text-align: center;
    }
    .input-group input:focus { border-color: var(--rust); }
    .input-group input::placeholder { color: var(--muted); }

    /* ═══ BUTTONS ═══ */
    .btn-primary {
      background: var(--rust); color: var(--white); border: none; border-radius: 12px;
      padding: 14px 24px; font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: background .2s, transform .1s; letter-spacing: .3px;
    }
    .btn-primary:hover  { background: var(--rust-dk); }
    .btn-primary:active { transform: scale(.98); }

    .btn-ghost {
      background: none; border: 1.5px solid var(--tan); border-radius: 10px;
      padding: 9px 16px; font-size: .875rem; color: var(--muted); cursor: pointer;
      transition: all .2s; font-weight: 600;
    }
    .btn-ghost:hover { border-color: var(--rust); color: var(--rust); }

    /* ═══ APP SHELL ═══ */
    #app { display: none; }

    header {
      background: var(--white); border-bottom: 1px solid var(--tan);
      position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
    }
    .header-inner {
      max-width: 860px; margin: 0 auto; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .header-logo { font-size: 1.5rem; font-weight: 800; color: var(--rust); }
    .header-logo span { font-size: 1.3rem; margin-right: 6px; }
    .user-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--cream); border: 1px solid var(--tan); border-radius: 50px;
      padding: 6px 14px 6px 8px; font-size: .875rem; color: var(--muted);
      cursor: pointer; transition: border-color .2s;
      min-width: 0; max-width: 180px;
    }
    .user-chip #header-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .user-chip:hover { border-color: var(--rust); }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--rust); color: var(--white);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .8rem; flex-shrink: 0;
    }

    /* ═══ MAIN ═══ */
    main { max-width: 860px; margin: 0 auto; padding: 28px 20px 100px; }

    /* ═══ TABS ═══ */
    .view-tabs {
      display: flex; gap: 6px; margin-bottom: 20px;
      background: var(--tan); border-radius: 12px; padding: 4px;
    }
    .view-tab {
      flex: 1; border: none; border-radius: 9px; padding: 9px 8px;
      font-size: .83rem; font-weight: 700; cursor: pointer;
      background: none; color: var(--muted); transition: all .2s; white-space: nowrap;
    }
    .view-tab.active { background: var(--white); color: var(--text); box-shadow: 0 1px 4px rgba(44,36,22,.12); }

    /* ═══ FILTER BAR ═══ */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .filter-label { font-size: .78rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; flex-shrink: 0; }
    .filter-chip {
      background: var(--white); border: 1.5px solid var(--tan); border-radius: 50px;
      padding: 5px 14px; font-size: .82rem; cursor: pointer; color: var(--muted);
      transition: all .15s; white-space: nowrap;
    }
    .filter-chip:hover, .filter-chip.active { border-color: var(--rust); color: var(--rust); background: #fdf1ec; }

    /* ═══ SECTION HEADER ═══ */
    .section-title { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 14px; }
    .count-badge {
      display: inline-block; background: var(--tan); color: var(--muted);
      border-radius: 50px; padding: 2px 9px; font-size: .75rem; font-weight: 700;
      margin-left: 8px; vertical-align: middle;
    }

    /* ═══ CARDS ═══ */
    .cards-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }

    /* --- Base card --- */
    .rec-card {
      background: var(--white); border-radius: var(--radius); padding: 18px 20px;
      box-shadow: var(--shadow); border: 1.5px solid transparent;
      transition: border-color .2s, transform .15s; position: relative;
    }
    .rec-card:hover { border-color: var(--tan); transform: translateY(-2px); }

    /* --- Recommended card --- */
    .rec-card.recommended { border-left: 4px solid #6b7c4a; }

    /* --- Not recommended card --- */
    .rec-card.not-recommended { border-left: 4px solid #b0a090; opacity: .85; }

    /* --- Want to try card --- */
    .rec-card.want-to-try {
      background: #fdfaf6;
      border: 1.5px dashed #d4c4b0;
    }
    .rec-card.want-to-try:hover { border-color: #c0a888; }

    .card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 10px; margin-bottom: 8px;
    }
    .card-name { font-size: 1.1rem; font-weight: 700; color: var(--text); line-height: 1.2; }
    .rec-card.want-to-try .card-name { color: #5a4a36; }
    .rec-card.not-recommended .card-name { text-decoration: line-through; color: var(--muted); }

    .stars { color: #e8b844; font-size: .95rem; flex-shrink: 0; letter-spacing: 1px; }

    .card-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .tag { border-radius: 50px; padding: 3px 10px; font-size: .75rem; font-weight: 600; }
    .tag.cuisine  { background: #eef4e5; color: var(--olive); }
    .tag.price    { background: #fdf1ec; color: var(--rust); }
    .tag.type-bar { background: #e8eef2; color: var(--slate); }
    .tag.type-restaurant { background: #fdf8f0; color: #a07040; }
    .tag.status-try      { background: #fef9e7; color: #b08a00; }
    .tag.status-no       { background: #f5f0ec; color: #907060; }

    .card-notes { font-size: .88rem; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
    .card-url a { font-size: .82rem; color: var(--rust); text-decoration: none; font-weight: 600; }
    .card-url a:hover { text-decoration: underline; }
    .card-url { margin-bottom: 10px; }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      font-size: .78rem; color: #bdb0a0; gap: 8px;
    }
    .card-author { display: flex; align-items: center; gap: 6px; }
    .avatar-sm {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .6rem; font-weight: 700; flex-shrink: 0; color: var(--white);
    }
    .c0 { background: #c0522a; } .c1 { background: #6b7c4a; }
    .c2 { background: #4a6b7c; } .c3 { background: #7c4a6b; } .c4 { background: #8a7040; }

    .card-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; border-top: 1px solid var(--tan); padding-top: 10px; }
    .card-btn {
      background: var(--cream); border: 1px solid var(--tan); border-radius: 8px;
      padding: 5px 12px; font-size: .78rem; font-weight: 700; cursor: pointer;
      color: var(--muted); transition: all .15s;
    }
    .card-btn:hover { border-color: var(--rust); color: var(--rust); background: #fdf1ec; }
    .card-btn.primary-action { background: var(--rust); color: var(--white); border-color: var(--rust); }
    .card-btn.primary-action:hover { background: var(--rust-dk); }

    /* ═══ COMMENTS ═══ */
    .card-comments { margin-top: 10px; border-top: 1px solid var(--tan); padding-top: 10px; }
    .comments-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .comment-item { display: flex; gap: 8px; align-items: flex-start; }
    .comment-body { flex: 1; min-width: 0; }
    .comment-author { font-size: .78rem; font-weight: 700; color: var(--text); }
    .comment-date { font-size: .72rem; color: #bdb0a0; margin-left: 4px; }
    .comment-text { font-size: .83rem; color: var(--muted); display: block; line-height: 1.4; margin-top: 2px; }
    .comment-form { display: none; margin-top: 8px; }
    .comment-input {
      width: 100%; border: 1.5px solid var(--tan); border-radius: 8px; padding: 8px 10px;
      font-size: .83rem; font-family: inherit; color: var(--text); background: var(--cream);
      outline: none; resize: none; transition: border-color .2s;
    }
    .comment-input:focus { border-color: var(--rust); }
    .comment-actions { display: flex; gap: 6px; margin-top: 6px; }
    .comment-submit { background: var(--rust); color: var(--white); border: none; border-radius: 8px; padding: 6px 14px; font-size: .78rem; font-weight: 700; cursor: pointer; }
    .comment-submit:hover { background: var(--rust-dk); }
    .comment-cancel { background: none; border: 1px solid var(--tan); border-radius: 8px; padding: 6px 10px; font-size: .78rem; color: var(--muted); cursor: pointer; }
    .comment-cancel:hover { border-color: var(--rust); color: var(--rust); }

    /* ═══ EMPTY STATE ═══ */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 1rem; line-height: 1.5; }

    /* ═══ FAB ═══ */
    .fab {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--rust); color: var(--white); border: none; border-radius: 50px;
      padding: 16px 24px; font-size: 1rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 20px rgba(192,82,42,.4);
      display: flex; align-items: center; gap: 8px;
      transition: background .2s, transform .15s; z-index: 200;
    }
    .fab:hover  { background: var(--rust-dk); }
    .fab:active { transform: scale(.97); }

    /* ═══ MODAL ═══ */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(44,36,22,.45); z-index: 300;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white); border-radius: 24px 24px 0 0;
      width: 100%; max-width: 600px; padding: 28px 26px 40px;
      box-shadow: 0 -8px 40px rgba(44,36,22,.18);
      max-height: 92vh; overflow-y: auto;
    }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 1.2rem; font-weight: 800; color: var(--text); }
    .btn-close {
      background: var(--cream); border: none; border-radius: 50%; width: 34px; height: 34px;
      font-size: 1rem; cursor: pointer; color: var(--muted);
      display: flex; align-items: center; justify-content: center; transition: background .2s;
    }
    .btn-close:hover { background: var(--tan); }

    /* Step 1 — pick type */
    .type-chooser { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
    .type-card {
      border: 2px solid var(--tan); border-radius: 16px; padding: 22px 14px;
      text-align: center; cursor: pointer; transition: all .2s;
      background: var(--white); font-family: inherit; -webkit-appearance: none; appearance: none;
      width: 100%;
    }
    .type-card:hover, .type-card:focus { border-color: var(--rust); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(192,82,42,.15); outline: none; }
    .type-card:active { transform: scale(.97); }
    .type-card .tc-icon { font-size: 2.2rem; margin-bottom: 10px; display: block; }
    .type-card .tc-label { font-size: .95rem; font-weight: 800; color: var(--text); margin-bottom: 5px; display: block; }
    .type-card .tc-desc { font-size: .78rem; color: var(--muted); line-height: 1.4; display: block; }

    /* Step 2 — form */
    #form-step { display: none; }
    .step-back { display: flex; align-items: center; gap: 6px; font-size: .85rem; color: var(--muted); cursor: pointer; margin-bottom: 16px; font-weight: 600; }
    .step-back:hover { color: var(--rust); }
    .step-title { font-size: 1.05rem; font-weight: 800; color: var(--text); margin-bottom: 18px; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 7px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; border: 2px solid var(--tan); border-radius: 10px; padding: 11px 13px;
      font-size: 1rem; color: var(--text); background: var(--cream); outline: none; font-family: inherit; transition: border-color .2s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--rust); }
    .form-textarea { resize: vertical; min-height: 75px; }

    /* autocomplete container */
    .autocomplete-wrap { position: relative; }
    #places-dropdown {
      display: none; position: absolute; left: 0; right: 0; top: 100%;
      z-index: 1000; list-style: none;
      background: var(--white); border: 2px solid var(--rust); border-radius: 10px;
      margin-top: 2px; box-shadow: 0 4px 16px rgba(44,36,22,.15);
      max-height: 220px; overflow-y: auto;
    }
    .pac-item-custom {
      display: flex; flex-direction: column; padding: 10px 14px;
      cursor: pointer; border-bottom: 1px solid var(--tan);
    }
    .pac-item-custom:last-child { border-bottom: none; }
    .pac-item-custom:hover, .pac-item-custom.highlighted { background: #fdf1ec; }
    .pac-main { font-weight: 600; color: var(--text); font-size: .9rem; }
    .pac-secondary { font-size: .76rem; color: var(--muted); margin-top: 2px; }

    /* type toggle */
    .toggle-group { display: flex; gap: 8px; }
    .toggle-btn {
      flex: 1; border: 2px solid var(--tan); border-radius: 10px; padding: 10px;
      font-size: .88rem; font-weight: 700; cursor: pointer; background: none; color: var(--muted);
      transition: all .2s; text-align: center;
    }
    .toggle-btn.active { background: var(--slate); border-color: var(--slate); color: var(--white); }
    .toggle-btn.active.bar-active { background: var(--slate); border-color: var(--slate); }
    .toggle-btn.active.rest-active { background: #a07040; border-color: #a07040; }

    /* recommendation toggle (been-here only) */
    .rec-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
    .rec-btn {
      flex: 1; border: 2px solid var(--tan); border-radius: 10px; padding: 11px;
      font-size: .88rem; font-weight: 700; cursor: pointer; background: none; color: var(--muted); transition: all .2s; text-align: center;
    }
    .rec-btn.yes.active { background: #eef4e5; border-color: var(--olive); color: var(--olive); }
    .rec-btn.no.active  { background: #f5f0ec; border-color: #907060; color: #907060; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .star-picker { display: flex; gap: 8px; font-size: 1.5rem; cursor: pointer; }
    .star-picker span { transition: transform .1s; user-select: none; }
    .star-picker span:hover { transform: scale(1.2); }

    .btn-submit {
      width: 100%; background: var(--rust); color: var(--white); border: none; border-radius: 12px;
      padding: 15px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .2s; margin-top: 8px;
    }
    .btn-submit:hover { background: var(--rust-dk); }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

    /* ═══ TOAST ═══ */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--text); color: var(--white); border-radius: 50px; padding: 10px 22px;
      font-size: .9rem; font-weight: 600; opacity: 0; pointer-events: none;
      transition: opacity .3s, transform .3s; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .loading-spinner { text-align: center; padding: 40px; color: var(--muted); font-size: .95rem; }

    /* ═══ MOBILE FIRST ═══ */
    @media (max-width: 479px) {
      .welcome-card { padding: 32px 24px; }
      .welcome-card h1 { font-size: 1.6rem; }

      /* View tabs — shrink to fit 4 on one row, allow overflow scroll as fallback */
      .view-tabs { overflow-x: auto; scrollbar-width: none; flex-wrap: nowrap; gap: 4px; padding: 3px; }
      .view-tabs::-webkit-scrollbar { display: none; }
      .view-tab { font-size: .68rem; padding: 8px 3px; white-space: nowrap; flex-shrink: 0; flex-basis: 0; flex-grow: 1; }

      /* Filter bar — horizontal scroll, no label */
      .filter-label { display: none; }
      .filter-bar { flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
      .filter-bar::-webkit-scrollbar { display: none; }
      .filter-chip { white-space: nowrap; flex-shrink: 0; font-size: .76rem; padding: 4px 10px; }

      /* Main — less side padding */
      main { padding: 16px 12px 90px; }

      /* Modal — less padding */
      .modal { padding: 20px 14px 32px; }

      /* Form row — single column on phone */
      .form-row { grid-template-columns: 1fr; gap: 0; }

      /* Type cards — smaller padding */
      .type-card { padding: 14px 10px; }
      .type-card .tc-icon { font-size: 1.8rem; margin-bottom: 6px; }
      .type-card .tc-label { font-size: .88rem; }
      .type-card .tc-desc { font-size: .72rem; }

      /* FAB — smaller */
      .fab { padding: 13px 18px; font-size: .9rem; bottom: 20px; right: 16px; }

      /* Toggle buttons — smaller */
      .toggle-btn, .rec-btn { font-size: .8rem; padding: 9px 6px; }

      /* Header — tighter, clamp user chip */
      .header-inner { padding: 12px 14px; }
      .header-logo { font-size: 1.2rem; }
      .user-chip { max-width: 140px; font-size: .8rem; padding: 5px 10px 5px 6px; }

      /* Cards — smaller text */
      .card-name { font-size: 1rem; }
      .tag { font-size: .7rem; padding: 2px 8px; }
    }

    /* Extra-narrow (iPhone SE 320px) */
    @media (max-width: 359px) {
      .view-tab { font-size: .62rem; padding: 7px 2px; }
      .header-logo { font-size: 1.05rem; }
    }

    @media (min-width: 640px) {
      .cards-grid { grid-template-columns: 1fr 1fr; }
      .modal-overlay { align-items: center; padding: 20px; }
      .modal { border-radius: 24px; max-height: 85vh; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ WELCOME ═══════════════ -->
<div id="welcome-screen">
  <div class="welcome-card">
    <div class="logo">🍽️</div>
    <h1>InnerTable</h1>
    <p>Your group's shared restaurant bible.<br>Save places to try, and share what you've loved — or didn't.</p>
    <div class="input-group">
      <input type="text" id="name-input" placeholder="Enter your name to get started" maxlength="30" autocomplete="off" />
      <button class="btn-primary" onclick="enterApp()">Let's eat →</button>
    </div>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app">
  <header>
    <div class="header-inner">
      <div class="header-logo"><span>🍽️</span>InnerTable</div>
      <div class="user-chip" onclick="switchUser()" title="Switch user">
        <div class="avatar" id="header-avatar">?</div>
        <span id="header-name">You</span>
      </div>
    </div>
  </header>

  <main>
    <!-- View tabs -->
    <div class="view-tabs">
      <button class="view-tab active" data-view="all"         onclick="setView('all',this)">🗂 All</button>
      <button class="view-tab"        data-view="try"         onclick="setView('try',this)">📌 Want to Try</button>
      <button class="view-tab"        data-view="recommended" onclick="setView('recommended',this)">✅ Recommended</button>
      <button class="view-tab"        data-view="no"          onclick="setView('no',this)">👎 Skip</button>
    </div>

    <!-- Friend filter -->
    <div class="filter-bar">
      <span class="filter-label">By:</span>
      <div class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">Everyone</div>
      <div class="filter-chip" data-filter="mine" onclick="setFilter('mine',this)">Just mine</div>
      <div id="friend-filters"></div>
    </div>

    <div class="section-title">
      Places <span class="count-badge" id="rec-count">0</span>
    </div>

    <div id="cards-container">
      <div class="loading-spinner">Loading…</div>
    </div>
  </main>

     SCRIPTS

<script>
// ══════════════════════════════════════════════════
//  CONFIG — replace with your own values
// ══════════════════════════════════════════════════
const GOOGLE_MAPS_API_KEY = "AIzaSyBceaaaJk0AleFfXWv8yXkBOdQprgs9Uuk"; // ← paste your key here

const firebaseConfig = {
  apiKey:            "AIzaSyDVemZ2c93K06gQRrMRdc3X-GTgkkElxfE",
  authDomain:        "innertable.firebaseapp.com",
  databaseURL:       "https://innertable-default-rtdb.firebaseio.com",
  projectId:         "innertable",
  storageBucket:     "innertable.firebasestorage.app",
  messagingSenderId: "902947609845",
  appId:             "1:902947609845:web:36dc2f183657d4ba9b39bc"
};

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Load Google Places API dynamically
if (GOOGLE_MAPS_API_KEY !== "YOUR_GOOGLE_MAPS_API_KEY") {
  const s = document.createElement('script');
  s.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&libraries=places&v=weekly&callback=initAutocomplete`;

} else {

}

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
let currentUser  = null;
let currentView   = 'all';
let currentFilter = 'all';
let selectedStars = 0;
let addType       = null;  // 'try' | 'been'
let placeType     = 'restaurant';
let willRecommend = true;
let editingId     = null;  // for "mark as tried" upgrade flow
let allRecs       = {};

const COLORS   = ['c0','c1','c2','c3','c4'];
const colorMap = {};
let   colorIdx = 0;
function getUserColor(name) {
  if (!colorMap[name]) { colorMap[name] = COLORS[colorIdx++ % COLORS.length]; }
  return colorMap[name];
}

// ══════════════════════════════════════════════════
//  WELCOME
// ══════════════════════════════════════════════════
window.onload = function() {
  const saved = localStorage.getItem('it_user');
  if (saved) { currentUser = saved; showApp(); }
};

document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') enterApp(); });

function enterApp() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) { shake(document.getElementById('name-input')); return; }
  currentUser = val;
  localStorage.setItem('it_user', val);
  showApp();
}

function showApp() {
  document.getElementById('welcome-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('header-avatar').textContent = currentUser.slice(0,2).toUpperCase();
  document.getElementById('header-name').textContent = currentUser;
  loadRecs();
}

function switchUser() {
  if (confirm(`Switch from "${currentUser}"?`)) { localStorage.removeItem('it_user'); location.reload(); }
}

// ══════════════════════════════════════════════════
//  FIREBASE
// ══════════════════════════════════════════════════
function loadRecs() {
  db.ref('recommendations').on('value', snap => {
    allRecs = snap.val() || {};
    renderCards();
    updateFriendFilters();
  });
}

// ══════════════════════════════════════════════════
//  VIEW / FILTER
// ══════════════════════════════════════════════════
function setView(view, el) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

// ══════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════
function renderCards() {
  const container = document.getElementById('cards-container');
  let entries = Object.entries(allRecs);

  // view filter
  entries = entries.filter(([,r]) => {
    if (currentView === 'try')         return r.status === 'try';
    if (currentView === 'recommended') return r.status === 'recommended';
    if (currentView === 'no')          return r.status === 'not-recommended';
    return true;
  });

  // author filter
  entries = entries.filter(([,r]) => {
    if (currentFilter === 'all')  return true;
    if (currentFilter === 'mine') return r.author === currentUser;
    return r.author === currentFilter;
  });

  document.getElementById('rec-count').textContent = entries.length;

  if (!entries.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🍜</div><p>Nothing here yet.<br>Be the first to add a spot!</p></div>`;
    return;
  }

  entries.sort((a,b) => (b[1].ts||0) - (a[1].ts||0));
  container.innerHTML = `<div class="cards-grid">${entries.map(([id,r]) => cardHTML(id,r)).join('')}</div>`;
}

function cardHTML(id, r) {
  const isMine  = r.author === currentUser;
  const statusClass = r.status === 'recommended' ? 'recommended' : r.status === 'not-recommended' ? 'not-recommended' : 'want-to-try';
  const color   = getUserColor(r.author);
  const initials= (r.author||'?').slice(0,2).toUpperCase();
  const date    = r.ts ? new Date(r.ts).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
  const stars   = r.rating ? '★'.repeat(r.rating)+'☆'.repeat(5-r.rating) : '';

  const typeTag = r.placeType === 'bar'
    ? `<span class="tag type-bar">🍸 Bar</span>`
    : `<span class="tag type-restaurant">🍽 Restaurant</span>`;

  const statusTag = r.status === 'try'
    ? `<span class="tag status-try">📌 Want to Try</span>`
    : r.status === 'not-recommended'
    ? `<span class="tag status-no">👎 Skip it</span>`
    : '';

  const meta = `
    <div class="card-meta">
      ${typeTag}
      ${statusTag}
      ${r.cuisine  ? `<span class="tag cuisine">${esc(r.cuisine)}</span>`  : ''}
      ${r.price    ? `<span class="tag price">${esc(r.price)}</span>`      : ''}
      ${r.location ? `<span class="tag">📍 ${esc(r.location)}</span>`     : ''}
    </div>`;

  const notes = (r.status === 'try')
    ? (r.tryNote ? `<div class="card-notes">${esc(r.tryNote)}</div>` : '')
    : (r.notes   ? `<div class="card-notes">${esc(r.notes)}</div>`   : '');

  const urlEl = (r.status === 'try' && r.url)
    ? `<div class="card-url"><a href="${esc(r.url)}" target="_blank" rel="noopener">🔗 See review</a></div>`
    : '';

  // Actions
  let actions = '';
  if (isMine) {
    let btns = `<button class="card-btn" onclick="editEntry('${id}')">✏️ Edit</button>`;
    if (r.status === 'try') {
      btns += `<button class="card-btn primary-action" onclick="upgradeToTried('${id}')">🍴 I've Been Here</button>`;
    }
    actions = `<div class="card-actions">${btns}</div>`;
  }

  // Comments
  const commentEntries = r.comments ? Object.entries(r.comments).sort((a,b) => (a[1].ts||0)-(b[1].ts||0)) : [];
  const commentsList = commentEntries.length ? `<div class="comments-list">${commentEntries.map(([,c]) => {
    const cc = getUserColor(c.author);
    const ci = (c.author||'?').slice(0,2).toUpperCase();
    const cd = c.ts ? new Date(c.ts).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
    return `<div class="comment-item">
      <div class="avatar-sm ${cc}">${ci}</div>
      <div class="comment-body">
        <span class="comment-author">${esc(c.author)}</span><span class="comment-date">${cd}</span>
        <span class="comment-text">${esc(c.text)}</span>
      </div>
    </div>`;
  }).join('')}</div>` : '';
  const commentLabel = commentEntries.length ? `💬 ${commentEntries.length} comment${commentEntries.length !== 1 ? 's' : ''}` : '💬 Comment';
  const comments = `<div class="card-comments">
    ${commentsList}
    <div class="comment-form" id="cf-${id}">
      <textarea class="comment-input" id="ci-${id}" placeholder="Add a comment…" rows="2" maxlength="300"></textarea>
      <div class="comment-actions">
        <button class="comment-submit" onclick="submitComment('${id}',this)">Post</button>
        <button class="comment-cancel" onclick="toggleCommentForm('${id}')">Cancel</button>
      </div>
    </div>
    <button class="card-btn" onclick="toggleCommentForm('${id}')">${commentLabel}</button>
  </div>`;

  return `
    <div class="rec-card ${statusClass}">
      <div class="card-top">
        <div class="card-name">${esc(r.name)}</div>
        ${stars ? `<div class="stars">${stars}</div>` : ''}
      </div>
      ${meta}
      ${notes}
      ${urlEl}
      ${actions}
      ${comments}
      <div class="card-footer">
        <div class="card-author">
          <div class="avatar-sm ${color}">${initials}</div>
          <span>${esc(r.author)}${isMine ? ' (you)' : ''}</span>
        </div>
        <span>${date}</span>
      </div>
    </div>`;
}

function updateFriendFilters() {
  const authors = [...new Set(Object.values(allRecs).map(r=>r.author))].filter(a=>a!==currentUser);
  document.getElementById('friend-filters').innerHTML = authors.map(a =>
    `<div class="filter-chip" onclick="setFilter('${esc(a)}',this)">${esc(a)}</div>`
  ).join('');
}

// ══════════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════════
function openModal(prefillId) {
  editingId = prefillId || null;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('type-step').style.display = '';
  document.getElementById('form-step').style.display  = 'none';
  document.getElementById('modal-title').textContent = editingId ? 'Mark as Tried' : 'Add a Place';

  if (editingId) {
    // skip straight to been-here form
    selectAddType('been', true);
    // pre-fill name & location
    const r = allRecs[editingId];
    if (r) {
      document.getElementById('f-name').value     = r.name     || '';
      document.getElementById('f-location').value = r.location || '';
      setPlaceType(r.placeType || 'restaurant');
    }
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  clearForm();
  editingId = null;
}

function closeModalOnBg(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function upgradeToTried(id) { openModal(id); }

function editEntry(id) {
  const r = allRecs[id];
  if (!r) return;
  editingId = id;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-title').textContent = 'Edit Place';
  document.getElementById('type-step').style.display = 'none';
  document.getElementById('form-step').style.display = 'block';

  if (r.status === 'try') {
    addType = 'try';
    document.getElementById('form-step-title').textContent = '📌 Save a Place to Try';
    document.getElementById('try-fields').style.display  = 'block';
    document.getElementById('been-fields').style.display = 'none';
    document.getElementById('f-try-note').value = r.tryNote || '';
    document.getElementById('f-url').value       = r.url     || '';
  } else {
    addType = 'been';
    document.getElementById('form-step-title').textContent = '🍴 Review a Place You\'ve Visited';
    document.getElementById('try-fields').style.display  = 'none';
    document.getElementById('been-fields').style.display = 'block';
    setRecommend(r.status === 'recommended');
    document.getElementById('f-cuisine').value = r.cuisine || '';
    document.getElementById('f-price').value   = r.price   || '';
    if (r.rating) setStars(r.rating);
    document.getElementById('f-notes').value   = r.notes   || '';
  }

  document.getElementById('f-name').value     = r.name     || '';
  document.getElementById('f-location').value = r.location || '';
  setPlaceType(r.placeType || 'restaurant');
  document.querySelector('.step-back').style.display = 'none';
  document.querySelector('.modal').scrollTop = 0;
}

function toggleCommentForm(id) {
  const form = document.getElementById('cf-' + id);
  const opening = form.style.display !== 'block';
  form.style.display = opening ? 'block' : 'none';
  if (opening) document.getElementById('ci-' + id).focus();
}

function submitComment(id, btn) {
  const input = document.getElementById('ci-' + id);
  const text  = input.value.trim();
  if (!text) { input.focus(); return; }
  btn.disabled = true;
  db.ref('recommendations/' + id + '/comments').push({
    author: currentUser,
    text,
    ts: Date.now()
  }).then(() => {
    btn.disabled = false;
  }).catch(err => {
    console.error(err);
    showToast('❌ Could not post comment.');
    btn.disabled = false;
  });
}

function selectAddType(type, skipBack) {
  addType = type;
  document.getElementById('type-step').style.display  = 'none';
  document.getElementById('form-step').style.display  = 'block';
  document.getElementById('form-step-title').textContent = type === 'try' ? '📌 Save a Place to Try' : '🍴 Review a Place You\'ve Visited';
  document.getElementById('try-fields').style.display  = type === 'try'  ? 'block' : 'none';
  document.getElementById('been-fields').style.display = type === 'been' ? 'block' : 'none';
  // hide back button if coming from upgrade flow
  document.querySelector('.step-back').style.display = skipBack ? 'none' : 'flex';
  // scroll modal to top so form is visible
  document.querySelector('.modal').scrollTop = 0;
}

function backToTypeStep() {
  document.getElementById('type-step').style.display  = '';
  document.getElementById('form-step').style.display  = 'none';
}

// ══════════════════════════════════════════════════
//  FORM CONTROLS
// ══════════════════════════════════════════════════
function setPlaceType(t) {
  placeType = t;
  document.getElementById('tog-restaurant').classList.toggle('active',    t === 'restaurant');
  document.getElementById('tog-restaurant').classList.toggle('rest-active', t === 'restaurant');
  document.getElementById('tog-bar').classList.toggle('active',   t === 'bar');
  document.getElementById('tog-bar').classList.toggle('bar-active', t === 'bar');
}

function setRecommend(val) {
  willRecommend = val;
  document.getElementById('rec-yes').classList.toggle('active', val);
  document.getElementById('rec-no').classList.toggle('active', !val);
  document.getElementById('rating-group').style.display = val ? '' : 'none';
}

function setStars(n) {
  selectedStars = n;
  document.querySelectorAll('#star-picker span').forEach((s,i) => { s.textContent = i < n ? '★' : '☆'; });
}

function clearForm() {
  ['f-name','f-location','f-try-note','f-url','f-notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('f-cuisine').value = '';
  document.getElementById('f-price').value   = '';
  setStars(0);
  setPlaceType('restaurant');
  willRecommend = true;
  setRecommend(true);
  addType   = null;
  editingId = null;
}

// ══════════════════════════════════════════════════
//  SUBMIT
// ══════════════════════════════════════════════════
function submitRec() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { shake(document.getElementById('f-name')); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  let rec = {
    name,
    placeType,
    location: document.getElementById('f-location').value.trim(),
    author:   currentUser,
    ts:       Date.now()
  };

  if (addType === 'try') {
    rec.status  = 'try';
    rec.tryNote = document.getElementById('f-try-note').value.trim();
    rec.url     = document.getElementById('f-url').value.trim();
  } else {
    rec.status  = willRecommend ? 'recommended' : 'not-recommended';
    rec.cuisine = document.getElementById('f-cuisine').value;
    rec.price   = document.getElementById('f-price').value;
    rec.rating  = willRecommend ? selectedStars : 0;
    rec.notes   = document.getElementById('f-notes').value.trim();
  }

  if (editingId) {
    const orig = allRecs[editingId];
    if (orig) { rec.author = orig.author; rec.ts = orig.ts; }
  }

  const op = editingId
    ? db.ref('recommendations/' + editingId).update(rec)
    : db.ref('recommendations').push(rec);

  op.then(() => {
    showToast(addType === 'try' ? '📌 Saved to your list!' : '🎉 Review saved!');
    closeModal();
    btn.disabled = false; btn.textContent = 'Save';
  }).catch(err => {
    showToast('❌ Error saving — check Firebase config.');
    console.error(err);
    btn.disabled = false; btn.textContent = 'Save';
  });
}

// ══════════════════════════════════════════════════
//  GOOGLE PLACES AUTOCOMPLETE (Places API New)
// ══════════════════════════════════════════════════
async function initAutocomplete() {
  const input = document.getElementById('f-name');
  let sessionToken = new google.maps.places.AutocompleteSessionToken();

  // Build dropdown
  const wrap = input.parentElement;
  const dropdown = document.createElement('ul');
  dropdown.id = 'places-dropdown';
  wrap.appendChild(dropdown);

  function hideDropdown() { dropdown.innerHTML = ''; dropdown.style.display = 'none'; }

  input.addEventListener('input', async () => {
    const val = input.value.trim();
    if (val.length < 2) { hideDropdown(); return; }

    try {
      const { suggestions } = await google.maps.places.AutocompleteSuggestion.fetchAutocompleteSuggestions({
        input: val,
        sessionToken,
        includedPrimaryTypes: ['restaurant', 'bar', 'cafe', 'night_club', 'bakery'],
      });

      if (!suggestions.length) { hideDropdown(); return; }

      dropdown.innerHTML = '';
      suggestions.slice(0, 5).forEach((s) => {
        const pred = s.placePrediction;
        const li = document.createElement('li');
        li.className = 'pac-item-custom';
        li.innerHTML = `<span class="pac-main">${esc(pred.mainText.text)}</span>`
          + (pred.secondaryText ? `<span class="pac-secondary">${esc(pred.secondaryText.text)}</span>` : '');

        li.addEventListener('mousedown', async (e) => {
          e.preventDefault();
          input.value = pred.mainText.text;
          hideDropdown();

          try {
            const place = pred.toPlace();
            await place.fetchFields({ fields: ['displayName','formattedAddress','types','priceLevel'] });

            if (place.displayName)      input.value = place.displayName;
            if (place.formattedAddress) {
              const parts = place.formattedAddress.split(',');
              document.getElementById('f-location').value = parts.slice(1, 3).join(',').trim();
            }
            if (place.types) {
              const isBar = place.types.some(t => ['bar','night_club','liquor_store'].includes(t));
              setPlaceType(isBar ? 'bar' : 'restaurant');
            }
            if (place.priceLevel != null) {
              const priceMap = {
                'INEXPENSIVE': '$', 'FREE': '$',
                'MODERATE': '$$', 'EXPENSIVE': '$$$', 'VERY_EXPENSIVE': '$$$$',
                1: '$', 2: '$$', 3: '$$$', 4: '$$$$'
              };
              const p = priceMap[place.priceLevel];
              if (p) document.getElementById('f-price').value = p;
            }
          } catch (err) { console.error('Place detail fetch error:', err); }

          sessionToken = new google.maps.places.AutocompleteSessionToken(); // reset after selection
        });

        dropdown.appendChild(li);
      });

      dropdown.style.display = 'block';
    } catch (err) {
      console.error('Places autocomplete error:', err);
      hideDropdown();
    }
  });

  input.addEventListener('blur', () => setTimeout(hideDropdown, 200));
}

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function shake(el) {
  el.style.borderColor = 'var(--rust)';
  el.focus();
  setTimeout(() => el.style.borderColor = '', 1200);
}
</script>
