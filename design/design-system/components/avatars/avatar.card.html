<link rel="stylesheet" href="../../styles.css">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<div id="root" style="padding:16px;background:var(--color-canvas);"></div>
<script type="text/babel">
  const { Avatar, AvatarStack } = window.InnerTable;
  function Demo() {
    return (
      <div style={{display:'flex', flexDirection:'column', gap:16}}>
        <div style={{display:'flex', gap:10, alignItems:'center'}}>
          <Avatar initials="MK" size={34} />
          <Avatar initials="JD" size={34} />
          <Avatar initials="AR" size={34} />
          <Avatar initials="SL" size={34} />
          <Avatar initials="PT" size={34} />
        </div>
        <AvatarStack people={[{initials:'SM'},{initials:'AR'},{initials:'PT'},{initials:'MK'}]} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
