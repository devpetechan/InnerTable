<!-- @dsCard group="Components" viewport="440x760" subtitle="The 3 signal states — recommend / want-to-try / mixed" name="Place Card" -->
<link rel="stylesheet" href="../../styles.css">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<div id="root" style="padding:16px;background:var(--color-canvas);"></div>
<script type="text/babel">
  const { PlaceCard } = window.InnerTable;
  function Demo() {
    return (
      <div style={{display:'flex', flexDirection:'column', gap:14}}>
        <PlaceCard
          name="Casa Enrique" metaLine="Restaurant · Mexican · $$ · LIC"
          status="recommends" people={[{initials:'SM'},{initials:'AR'},{initials:'PT'}]}
          signalText="Sam, Ana +3 recommend" rating={4.7}
          topTake={{ author:'Sam', initials:'SM', rating:5.0, note:'Best mole in the city — worth the L train.' }}
          comments={4}
        />
        <PlaceCard
          name="Attaboy" metaLine="Bar · Cocktails · $$$ · Lower East Side"
          status="try" people={[{initials:'AR'},{initials:'SL'},{initials:'MK'}]}
          signalText="4 friends want to try" googleRating={4.5}
          comments={2}
        />
        <PlaceCard
          name="Kiki's" metaLine="Restaurant · Greek · $$ · Lower East Side"
          status="mixed" people={[{initials:'MK'},{initials:'SM'}]}
          signalText="2 recommend · 2 passed" rating={3.1}
          topTake={{ author:'Sam', initials:'SM', isPass:true, note:'90-minute wait and the food was mid. Skip it.' }}
          comments={7}
        />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
