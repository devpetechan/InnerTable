<link rel="stylesheet" href="../styles.css">
<div style="display:flex;gap:10px;padding:14px;font-family:var(--font-ui);box-sizing:border-box;">
  <div style="flex:1;"><div style="height:52px;border-radius:9px;background:var(--color-paper-raised);border:1px solid var(--color-border-card);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--color-faint);margin-top:6px;">Paper Raised<br>#FFFFFF</div></div>
  <div style="flex:1;"><div style="height:52px;border-radius:9px;background:var(--color-paper);border:1px solid var(--color-border-card);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--color-faint);margin-top:6px;">Paper<br>#FCFBF9</div></div>
  <div style="flex:1;"><div style="height:52px;border-radius:9px;background:var(--color-canvas);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--color-faint);margin-top:6px;">Canvas<br>#F1EDE6</div></div>
  <div style="flex:1;"><div style="height:52px;border-radius:9px;background:var(--color-ink);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--color-faint);margin-top:6px;">Ink<br>#292420</div></div>
  <div style="flex:1;"><div style="height:52px;border-radius:9px;background:var(--color-secondary);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--color-faint);margin-top:6px;">Secondary<br>#5F574F</div></div>
  <div style="flex:1;"><div style="height:52px;border-radius:9px;background:var(--color-muted);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--color-faint);margin-top:6px;">Muted<br>#8A817A</div></div>
  <div style="flex:1;"><div style="height:52px;border-radius:9px;background:var(--color-accent);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--color-faint);margin-top:6px;">Accent Clay<br>#C1552E</div></div>
</div>
