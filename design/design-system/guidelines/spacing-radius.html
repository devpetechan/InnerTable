<!-- @dsCard group="Spacing" viewport="700x220" subtitle="4px scale + corner radii" name="Spacing & radius" -->
<link rel="stylesheet" href="../styles.css">
<div style="padding:16px;font-family:var(--font-ui);">
  <div style="display:flex;align-items:flex-end;gap:10px;margin-bottom:20px;">
    <div><div style="width:var(--space-1);height:var(--space-1);background:var(--color-accent);"></div><div style="font-size:10px;color:var(--color-faint);margin-top:4px;">4</div></div>
    <div><div style="width:var(--space-2);height:var(--space-2);background:var(--color-accent);"></div><div style="font-size:10px;color:var(--color-faint);margin-top:4px;">8</div></div>
    <div><div style="width:var(--space-3);height:var(--space-3);background:var(--color-accent);"></div><div style="font-size:10px;color:var(--color-faint);margin-top:4px;">12</div></div>
    <div><div style="width:var(--space-4);height:var(--space-4);background:var(--color-accent);"></div><div style="font-size:10px;color:var(--color-faint);margin-top:4px;">16</div></div>
    <div><div style="width:var(--space-5);height:var(--space-5);background:var(--color-accent);"></div><div style="font-size:10px;color:var(--color-faint);margin-top:4px;">20</div></div>
    <div><div style="width:var(--space-6);height:var(--space-6);background:var(--color-accent);"></div><div style="font-size:10px;color:var(--color-faint);margin-top:4px;">24</div></div>
  </div>
  <div style="display:flex;gap:14px;">
    <div><div style="width:52px;height:52px;background:#fff;border:1px solid var(--color-border-card);border-radius:var(--radius-sm);"></div><div style="font-size:10px;color:var(--color-faint);margin-top:4px;">sm 7</div></div>
    <div><div style="width:52px;height:52px;background:#fff;border:1px solid var(--color-border-card);border-radius:var(--radius-md);"></div><div style="font-size:10px;color:var(--color-faint);margin-top:4px;">md 11</div></div>
    <div><div style="width:52px;height:52px;background:#fff;border:1px solid var(--color-border-card);border-radius:var(--radius-lg);"></div><div style="font-size:10px;color:var(--color-faint);margin-top:4px;">lg 14</div></div>
    <div><div style="width:52px;height:52px;background:#fff;border:1px solid var(--color-border-card);border-radius:var(--radius-xl);"></div><div style="font-size:10px;color:var(--color-faint);margin-top:4px;">xl 16</div></div>
    <div><div style="width:52px;height:52px;background:#fff;border:1px solid var(--color-border-card);border-radius:var(--radius-pill);"></div><div style="font-size:10px;color:var(--color-faint);margin-top:4px;">pill</div></div>
  </div>
</div>
