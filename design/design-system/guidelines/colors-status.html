<!-- @dsCard group="Colors" viewport="700x130" subtitle="Status chip fill / text / dot per verdict" name="Status colors" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex;gap:14px;padding:16px;font-family:var(--font-ui);flex-wrap:wrap;">
  <span style="display:inline-flex;align-items:center;gap:6px;background:var(--status-try-bg);color:var(--status-try-text);font-weight:600;font-size:12.5px;padding:5px 11px;border-radius:7px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--status-try-dot);"></span>Want to Try</span>
  <span style="display:inline-flex;align-items:center;gap:6px;background:var(--status-rec-bg);color:var(--status-rec-text);font-weight:600;font-size:12.5px;padding:5px 11px;border-radius:7px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--status-rec-dot);"></span>Recommends</span>
  <span style="display:inline-flex;align-items:center;gap:6px;background:var(--status-pass-bg);color:var(--status-pass-text);font-weight:600;font-size:12.5px;padding:5px 11px;border-radius:7px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--status-pass-dot);"></span>Hard Pass</span>
  <span style="display:inline-flex;align-items:center;background:var(--status-mixed-bg);color:var(--status-mixed-text);font-weight:600;font-size:12.5px;padding:5px 11px;border-radius:7px;border:1px solid var(--status-mixed-border);">Mixed</span>
</div>
